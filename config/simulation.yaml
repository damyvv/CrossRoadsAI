window:
  width: 960
  height: 720

intersection:
  arm_count: 4
  inbound_lanes:
    N:
      - movements: [left]
      - movements: [left]
      - movements: [straight]
      - movements: [straight]
      - movements: [right]
    E:
      - movements: [straight, left]
        movement_probabilities:
          straight: 0.5
          left: 0.5
      - movements: [straight, right]
        movement_probabilities:
          straight: 0.5
          right: 0.5
    S:
      - movements: [left, right, straight]
        movement_probabilities:
          left: 0.34
          right: 0.33
          straight: 0.33
    W:
      - movements: [straight, left]
        movement_probabilities:
          straight: 0.5
          left: 0.5
      - movements: [straight, right]
        movement_probabilities:
          straight: 0.5
          right: 0.5

road:
  width: 120
  stop_line_distance: 70

vehicle:
  top_speed: 4.0
  acceleration: 0.2
  deceleration: 0.3
  length: 24
  width: 12
  queue_gap: 8
  stop_distance_before_line: 10.0
  spawn_rate_per_second: 2.0

simulation:
  green_duration_ticks: 150
  yellow_duration_ticks: 60
  ticks_per_second: 60
  vehicle_spawn_seed: 42

phases:
  - arms: [N, S]
    name: N
  - arms: [E, W]
    name: EW
