window:
  width: 960
  height: 720

intersection:
  arm_count: 4
  inbound_lanes:
    N:
      - movements: [left]
      - movements: [left]
      - movements: [straight]
      - movements: [straight]
      - movements: [straight]
      - movements: [right]
    E:
      - movements: [left, straight]
        movement_probabilities:
          left: 0.5
          straight: 0.5
      - movements: [straight, right]
        movement_probabilities:
          straight: 0.5
          right: 0.5
    S:
      - movements: [left, straight, right]
        movement_probabilities:
          left: 0.34
          straight: 0.33
          right: 0.33
    W:
      - movements: [left, straight]
        movement_probabilities:
          left: 0.5
          straight: 0.5
      - movements: [straight, right]
        movement_probabilities:
          straight: 0.5
          right: 0.5

road:
  lane_width: 30
  stop_line_distance: 100
  stop_line_distance_by_arm:
    N: 60
    E: 40
    S: 60
    W: 140
  # carriageway_separation: 40

vehicle:
  top_speed: 4.0
  acceleration: 0.2
  deceleration: 0.3
  length: 24
  width: 12
  queue_gap: 8
  stop_distance_before_line: 10.0
  spawn_rate_per_second: 2.0

simulation:
  green_duration_ticks: 150
  yellow_duration_ticks: 60
  ticks_per_second: 60
  vehicle_spawn_seed: 42

phases:
  - arms: [N]
    name: N
  - arms: [E]
    name: E
  - arms: [S]
    name: S
  - arms: [W]
    name: W
